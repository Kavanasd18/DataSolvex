<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Server</title>
    <style>
      /* Basic styling */
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f5f5f5;
        margin: 0;
      }
      .container {
        width: 400px;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      input {
        width: 95%;
        padding: 10px;
        margin: 10px 0;
        font-size: 16px;
      }
      button {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        font-size: 16px;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
      .db-list {
        margin-top: 20px;
      }
      .db-item {
        padding: 10px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 4px;
        margin-bottom: 5px;
        cursor: pointer;
      }
      .db-item:hover {
        background-color: #e6f7ff;
      }
     
    </style>
  </head>
  <body>
    <div class="container">
      <h3>Search for a Stagging Server</h3>
      <input type="text" id="serverName" placeholder="Enter server name..." />
      <button onclick="searchServer()">Search</button>

      <div id="dbList" class="db-list"></div>

      
    </div>

    <script>
      function searchServer() {
        const serverName = document.getElementById("serverName").value;
        const dbList = document.getElementById("dbList");
        dbList.innerHTML = ""; // Clear previous results

        if (!serverName) {
          alert("Please enter a server name.");
          return;
        }

        // Encode the server name to handle special characters like backslash
        const encodedServerName = encodeURIComponent(serverName);

        fetch(`/search_servers?query=${encodedServerName}`)
          .then((response) => {
            if (response.ok) {
              return response.json();
            } else {
              throw new Error("No databases found or invalid server.");
            }
          })
          .then((data) => {
            const server = Object.keys(data)[0];
            const databases = data[server];

            if (databases.length > 0) {
              // Add heading before listing databases
              const heading = document.createElement("h4");
              heading.textContent = "List of Databases in Stagging server";
              dbList.appendChild(heading);

              databases.forEach((db) => {
                const dbItem = document.createElement("div");
                dbItem.className = "db-item";
                dbItem.textContent = db;
                dbItem.onclick = () =>
                  (window.location.href = `/database_page?server=${server}&database=${db}`);
                dbList.appendChild(dbItem);
              });
            } else {
              dbList.innerHTML = "<p>No databases found for this server.</p>";
            }
          })

          .catch((error) => {
            dbList.innerHTML = `<p>Error: ${error.message}</p>`;
          });
      }
    </script>
    <script>
  window.addEventListener('beforeunload', function () {
    const data = JSON.stringify({
      page: window.location.pathname,
      timestamp: new Date().toISOString()
    });

    // 👇 This is CRITICAL: content type must be application/json
    const blob = new Blob([data], { type: 'application/json' });
    navigator.sendBeacon('/log-exit', blob);
  });
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const now = new Date().toISOString();
    const page = window.location.pathname;

    fetch('/log-entry', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            page: page,
            timestamp: now
        })
    });
});
</script>

  </body>
</html>
