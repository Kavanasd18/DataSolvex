<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Replication Summary</title>
 
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='replication.css') }}"
  />
</head>
<body>
  <div class="navbar">
    <h2>SQL Replication Dashboard</h2>
    <div>
      <a href="{{ url_for('dashboard') }}">Details</a>
      <a href="{{ url_for('dashboard_summary') }}">Summary</a>
    </div>
  </div>
 
  <div class="content">
    <div class="section-header">
        <h2 class="section-title">Replication Summary Overview</h2>
    </div>
    <div class="table-container">

      {{ summary_table | safe }}
    </div>
  </div>
  <script>
  window.addEventListener('beforeunload', function () {
    const data = JSON.stringify({
      page: window.location.pathname,
      timestamp: new Date().toISOString()
    });
 
    const blob = new Blob([data], { type: 'application/json' });
    navigator.sendBeacon('/log-exit', blob);
  });
</script>
 
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const now = new Date().toISOString();
    const page = window.location.pathname;
 
    fetch('/log-entry', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        page: page,
        timestamp: now
      })
    });
  });
</script>
</body>
</html>
